<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#080b0d">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="PDR Календарь">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="192x192" href="./icons/icon-192.png">
  <title>PDR Календарь</title>
  <style>
    :root {
      --bg: #080b0d;
      --panel: #121719;
      --panel-2: #1b2326;
      --line: rgba(255,255,255,.13);
      --line-strong: rgba(255,255,255,.24);
      --text: #f8fbff;
      --soft: #d7e0e4;
      --muted: #9aa8ad;
      --accent: #62e58f;
      --mobile: #62e58f;
      --base: #ff756d;
      --personal: #65b7ff;
      --warning: #f3c45f;
      --radius: 20px;
      --slot-height: 58px;
      --time-col: 52px;
      --topbar-height: 118px;
      --font-display: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      --font-text: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", sans-serif;
      color-scheme: dark;
      font-family: var(--font-text);
    }
    * { box-sizing: border-box; }
    html, body { min-height: 100%; background: var(--bg); overscroll-behavior-y: auto; }
    body {
      margin: 0;
      color: var(--text);
      background:
        linear-gradient(180deg, rgba(98,229,143,.1), transparent 180px),
        linear-gradient(180deg, #10161a 0%, #080b0d 48%, #050708 100%);
      overflow-x: hidden;
    }
    button, input, textarea { font: inherit; letter-spacing: 0; }
    button {
      border: 0;
      min-height: 44px;
      border-radius: 15px;
      padding: 0 14px;
      color: var(--text);
      background: rgba(255,255,255,.1);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
      cursor: pointer;
      touch-action: manipulation;
    }
    button:active { transform: translateY(1px); }
    .app {
      width: min(100%, 1040px);
      margin: 0 auto;
      padding: max(12px, env(safe-area-inset-top)) 8px calc(18px + env(safe-area-inset-bottom));
    }
    .topbar {
      position: fixed;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
      width: min(100%, 1040px);
      margin: 0;
      padding: max(12px, env(safe-area-inset-top)) 12px 12px;
      background: rgba(8,11,13,.94);
      backdrop-filter: blur(18px) saturate(1.15);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 14px 34px rgba(0,0,0,.35);
    }
    .app::before {
      content: "";
      display: block;
      height: calc(var(--topbar-height) + 12px);
    }
    .title-row, .nav-row, .mode-tabs, .sheet-head {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-row { justify-content: space-between; margin-bottom: 10px; }
    .brand { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .mark {
      width: 38px; height: 38px; border-radius: 14px;
      display: grid; place-items: center;
      background: linear-gradient(145deg, #8dffad, #35c56c);
      color: #031108; font-weight: 780;
      box-shadow: 0 12px 28px rgba(98,229,143,.28), inset 0 0 0 1px rgba(255,255,255,.34);
      position: relative;
    }
    .mark::before {
      content: "";
      width: 18px;
      height: 18px;
      border: 2px solid #07140c;
      border-radius: 5px;
      box-shadow: inset 0 5px 0 rgba(7,20,12,.18);
    }
    .mark::after {
      content: "";
      position: absolute;
      width: 14px;
      height: 2px;
      background: #07140c;
      top: 15px;
      border-radius: 2px;
    }
    h1 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 20px;
      line-height: 1.08;
      letter-spacing: 0;
      font-weight: 760;
    }
    .period-sub { display: none; color: var(--muted); font-size: 12px; margin-top: 3px; }
    .icon-btn { width: 44px; min-width: 44px; padding: 0; display: grid; place-items: center; font-size: 24px; }
    .install-btn {
      display: none;
      min-height: 38px;
      padding: 0 12px;
      border-radius: 13px;
      background: rgba(98,229,143,.14);
      color: var(--accent);
      border: 1px solid rgba(98,229,143,.5);
      font-weight: 720;
    }
    .install-btn.show { display: inline-grid; place-items: center; }

    .primary { background: var(--accent); color: #031108; font-weight: 760; box-shadow: 0 12px 26px rgba(98,229,143,.18); }
    .danger { background: rgba(255,117,109,.16); color: #ffd2cf; box-shadow: inset 0 0 0 1px rgba(255,117,109,.24); }
    .nav-row { justify-content: space-between; }
    .mode-tabs {
      flex: 1;
      min-width: 0;
      padding: 4px;
      border-radius: 17px;
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .mode-tabs button {
      flex: 1;
      min-width: 0;
      min-height: 40px;
      padding: 0 8px;
      color: var(--muted);
      background: transparent;
      font-weight: 680;
    }
    .mode-tabs button.active { color: #031108; background: var(--accent); box-shadow: 0 8px 18px rgba(98,229,143,.16); }
    .view { display: none; }
    .view.active { display: block; }

    .month-weekdays {
      position: sticky;
      top: var(--topbar-height);
      z-index: 22;
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      column-gap: 2px;
      width: 100%;
      padding: 0;
      margin: 4px 0 9px;
      background: rgba(8,11,13,.96);
      backdrop-filter: blur(14px);
      color: #c2cbd0;
      font-size: 11px;
      text-align: center;
      font-weight: 650;
      letter-spacing: .035em;
      text-transform: uppercase;
    }
    .month-grid {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 0;
    }
    .month-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding-top: 0;
    }
    .month-divider {
      color: var(--soft);
      font-size: 30px;
      font-family: var(--font-display);
      font-weight: 740;
      letter-spacing: 0;
      line-height: 1;
      text-align: center;
      padding: 12px 2px 0;
      border-top: 1px solid var(--line);
      min-height: 34px;
    }
    .month-week {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      column-gap: 2px;
      width: 100%;
      height: 230px;
      min-height: 230px;
    }
    .month-day {
      min-width: 0;
      height: 230px;
      min-height: 230px;
      border: 0;
      border-radius: 0;
      background: rgba(255,255,255,.015);
      padding: 2px;
      overflow: hidden;
      touch-action: pan-y;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      box-shadow: inset -1px 0 0 rgba(255,255,255,.035), inset 0 -1px 0 rgba(255,255,255,.035);
    }
    .month-day.outside { opacity: .46; background: rgba(255,255,255,.006); }
    .month-day.ghost-cell {
      visibility: hidden;
      pointer-events: none;
    }
    .month-day.drop-target, .grid-cell.drop-target {
      outline: 2px solid rgba(98,229,143,.75);
      background: rgba(98,229,143,.12);
    }
    .day-num {
      flex: 0 0 auto;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      line-height: 1;
      font-weight: 680;
      margin: 0 0 4px;
      padding: 0;
    }
    .day-num-inner {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      border: 1px solid transparent;
      border-radius: 999px;
    }
    .day-num-inner.today,
    .day-num-inner.selected {
      border-color: rgba(98,229,143,.85);
      color: #031108;
      background: var(--accent);
      box-shadow: 0 0 0 3px rgba(98,229,143,.13);
    }
    .day-items {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 3px;
    }
    .entry-chip {
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      gap: 3px;
      width: 100%;
      min-width: 0;
      min-height: 54px;
      height: auto;
      padding: 4px 4px 6px;
      border-radius: 6px;
      border: 1px solid rgba(98,229,143,.38);
      background: rgba(98,229,143,.18);
      color: #c9ffd9;
      overflow: visible;
      box-sizing: border-box;
      font-family: var(--font-text);
      touch-action: pan-y;
      user-select: none;
      box-shadow: 0 6px 14px rgba(0,0,0,.2), inset 3px 0 0 var(--mobile);
    }
    .entry-chip.base { border-color: rgba(255,117,109,.4); background: rgba(255,117,109,.18); color: #ffd5d2; box-shadow: 0 6px 14px rgba(0,0,0,.2), inset 3px 0 0 var(--base); }
    .entry-chip.personal { border-color: rgba(101,183,255,.42); background: rgba(101,183,255,.18); color: #d5ecff; box-shadow: 0 6px 14px rgba(0,0,0,.2), inset 3px 0 0 var(--personal); }
    .entry-chip.all-day { flex: 0 0 auto; min-height: 50px; background: rgba(98,229,143,.28); }
    .entry-chip.base.all-day { background: rgba(255,117,109,.28); }
    .entry-chip.personal.all-day { background: rgba(101,183,255,.28); }
    .entry-chip.all-day {
      box-shadow: 0 8px 18px rgba(0,0,0,.22), inset 0 0 0 1px currentColor;
      background-image: linear-gradient(135deg, rgba(255,255,255,.16), transparent 42%);
    }
    .entry-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
      font-size: 10.5px;
      line-height: 1.24;
      font-weight: 680;
      color: currentColor;
      white-space: normal;
      word-break: normal;
      overflow-wrap: break-word;
      hyphens: auto;
      padding-bottom: 1px;
    }
    .entry-time {
      font-size: 9.5px;
      line-height: 1.25;
      opacity: .9;
      color: currentColor;
      margin-top: 2px;
      padding-bottom: 1px;
      width: 100%;
      min-width: 0;
      box-sizing: border-box;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .entry-chip.dragging { opacity: .55; }
    .dragging { opacity: .35; }
    .drag-ghost {
      position: fixed;
      left: 0;
      top: 0;
      z-index: 9999;
      pointer-events: none;
      width: 132px;
      min-height: 44px;
      padding: 6px;
      border-radius: 8px;
      border: 1px solid rgba(98,229,143,.46);
      background: rgba(98,229,143,.24);
      color: #c9ffd9;
      opacity: .95;
      transform: translate(-50%, -50%) scale(1.03);
      box-shadow: 0 12px 30px rgba(0,0,0,.35);
      overflow: hidden;
      font-family: var(--font-text);
    }
    .drag-ghost.base { border-color: rgba(255,117,109,.48); background: rgba(255,117,109,.24); color: #ffd5d2; }
    .drag-ghost.personal { border-color: rgba(101,183,255,.5); background: rgba(101,183,255,.24); color: #d5ecff; }
    .drag-ghost.all-day { background: rgba(98,229,143,.34); }
    .drag-ghost.base.all-day { background: rgba(255,117,109,.34); }
    .drag-ghost.personal.all-day { background: rgba(101,183,255,.34); }
    .drag-ghost-title {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      font-size: 11px;
      line-height: 1.1;
      font-weight: 680;
    }
    .drag-ghost-time {
      margin-top: 4px;
      font-size: 10px;
      line-height: 1;
      opacity: .85;
    }
    .more {
      flex: 0 0 auto;
      color: #b8c5ca;
      font-size: 10px;
      line-height: 14px;
      margin: 0 2px;
      font-weight: 620;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .schedule {
      position: relative;
      min-height: calc(20 * var(--slot-height));
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255,255,255,.025);
      display: grid;
      grid-template-columns: var(--time-col) 1fr;
      grid-template-rows: repeat(20, var(--slot-height));
    }
    .time-cell {
      color: #b2c0c5;
      font-size: 11px;
      padding: 7px 0 0 3px;
      border-bottom: 1px solid rgba(255,255,255,.09);
      background: rgba(0,0,0,.1);
    }
    .grid-cell {
      border-left: 1px solid rgba(255,255,255,.08);
      border-bottom: 1px solid rgba(255,255,255,.09);
      min-width: 0;
      touch-action: none;
    }
    .time-card {
      position: absolute;
      left: calc(var(--time-col) + 6px);
      right: 7px;
      z-index: 5;
      min-height: 48px;
      border-radius: 10px;
      border: 1px solid rgba(98,229,143,.42);
      background: rgba(98,229,143,.2);
      box-shadow: 0 12px 24px rgba(0,0,0,.28), inset 4px 0 0 var(--mobile);
      padding: 8px 10px;
      overflow: hidden;
      touch-action: pan-y;
      user-select: none;
    }
    .time-card.base { border-color: rgba(255,117,109,.44); background: rgba(255,117,109,.2); color: #ffd5d2; box-shadow: 0 12px 24px rgba(0,0,0,.28), inset 4px 0 0 var(--base); }
    .time-card.personal { border-color: rgba(101,183,255,.46); background: rgba(101,183,255,.2); color: #d5ecff; box-shadow: 0 12px 24px rgba(0,0,0,.28), inset 4px 0 0 var(--personal); }
    .time-card .time { color: currentColor; font-size: 11px; font-weight: 680; opacity: .9; }
    .time-card .name { color: currentColor; font-size: 14px; font-weight: 720; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; letter-spacing: 0; }
    .time-card .meta { color: var(--soft); font-size: 11px; opacity: .92; }
    .all-day-row { display: grid; gap: 7px; margin-bottom: 10px; }
    .all-day-card {
      display: grid;
      gap: 4px;
      border-radius: 10px;
      border: 1px solid rgba(98,229,143,.48);
      background: rgba(98,229,143,.28);
      background-image: linear-gradient(135deg, rgba(255,255,255,.16), transparent 45%);
      box-shadow: 0 10px 24px rgba(0,0,0,.24), inset 4px 0 0 var(--mobile);
      padding: 11px 12px;
      font-weight: 720;
      touch-action: pan-y;
    }
    .all-day-card small {
      color: var(--soft);
      font-size: 12px;
      line-height: 1;
      opacity: .86;
    }
    .all-day-card.base { border-color: rgba(255,117,109,.48); background-color: rgba(255,117,109,.28); color: #ffd5d2; box-shadow: 0 10px 24px rgba(0,0,0,.24), inset 4px 0 0 var(--base); }
    .all-day-card.personal { border-color: rgba(101,183,255,.5); background-color: rgba(101,183,255,.28); color: #d5ecff; box-shadow: 0 10px 24px rgba(0,0,0,.24), inset 4px 0 0 var(--personal); }

    .overlay {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.72);
      opacity: 0;
      pointer-events: none;
      transition: opacity .18s ease;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 90;
      width: min(100%, 620px);
      max-height: min(91vh, 860px);
      transform: translate(-50%, 105%);
      transition: transform .22s ease;
      border: 1px solid rgba(255,255,255,.18);
      border-bottom: 0;
      border-radius: 24px 24px 0 0;
      background: #111719;
      box-shadow: 0 -28px 80px rgba(0,0,0,.72);
      overflow: hidden;
    }
    .sheet.open { transform: translate(-50%, 0); }
    .sheet-head {
      position: sticky;
      top: 0;
      justify-content: space-between;
      z-index: 2;
      padding: 12px 14px;
      background: rgba(17,23,25,.98);
      border-bottom: 1px solid var(--line-strong);
    }
    .sheet h2 {
      margin: 0;
      font-family: var(--font-display);
      font-size: 18px;
      line-height: 1.1;
      letter-spacing: 0;
      font-weight: 740;
    }
    .sheet-body {
      max-height: calc(min(91vh, 860px) - 65px);
      overflow: auto;
      padding: 12px 12px calc(14px + env(safe-area-inset-bottom));
    }
    .field { margin-bottom: 9px; }
    label { display: block; margin: 0 0 5px 3px; color: #bbc6ca; font-size: 12px; font-weight: 640; }
    input, textarea {
      width: 100%;
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 16px;
      padding: 11px 13px;
      outline: none;
      color: var(--text);
      background: rgba(255,255,255,.08);
    }
    input { min-height: 44px; }
    textarea {
      min-height: 78px;
      resize: vertical;
      line-height: 1.35;
    }
    input:focus, textarea:focus { border-color: rgba(98,229,143,.72); box-shadow: 0 0 0 3px rgba(98,229,143,.12); }
    .type-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 7px;
    }
    .type-grid button {
      min-height: 40px;
      padding: 0 8px;
      color: #c1ccd0;
      font-weight: 680;
      border-radius: 14px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.08);
    }
    .type-grid button.active {
      color: #07140c;
      background: var(--accent);
      box-shadow: 0 8px 18px rgba(98,229,143,.16);
    }
    .type-grid button[data-type="base"].active { background: var(--base); color: #230606; }
    .type-grid button[data-type="personal"].active { background: var(--personal); color: #06121f; }
    .time-wheel-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
    .time-wheel-col {
      display: grid;
      gap: 5px;
      min-width: 0;
    }
    .time-wheel-title {
      color: #b8c5ca;
      font-size: 11px;
      font-weight: 680;
      text-align: center;
    }
    .time-wheel {
      height: 112px;
      overflow-y: auto;
      scroll-snap-type: y mandatory;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.16);
      background:
        linear-gradient(180deg, rgba(21,26,24,.92), rgba(21,26,24,0) 35%, rgba(21,26,24,0) 65%, rgba(21,26,24,.92)),
        rgba(255,255,255,.08);
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .time-wheel::-webkit-scrollbar { display: none; }
    .time-option {
      height: 40px;
      display: grid;
      place-items: center;
      scroll-snap-align: center;
      color: var(--muted);
      font-size: 20px;
      font-weight: 680;
    }
    .time-option.active {
      color: var(--accent);
      font-size: 28px;
      font-weight: 780;
    }
    .time-option.spacer { pointer-events: none; }
    .sheet-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }
    .sheet-actions button { min-height: 46px; font-weight: 740; }
    @media (max-width: 520px) {
      .month-weekdays { column-gap: 2px; }
      .month-grid { gap: 14px; }
      .month-section { gap: 10px; padding-top: 0; }
      .month-divider { font-size: 28px; padding-top: 10px; min-height: 34px; }
      .month-week { column-gap: 2px; height: 230px; min-height: 230px; }
      .month-day { height: 230px; min-height: 230px; padding: 1px; border-radius: 0; }
      .entry-chip { height: auto; min-height: 54px; padding: 4px 4px 6px; border-radius: 6px; }
      .entry-title { font-size: 10.5px; line-height: 1.24; padding-bottom: 1px; }
      .entry-time { font-size: 9.5px; line-height: 1.25; }
      .day-num { height: 22px; font-size: 16px; margin-bottom: 4px; }
      .day-num-inner { width: 22px; height: 22px; }
      .mode-tabs button { font-size: 13px; }
      .type-grid { grid-template-columns: 1fr 1fr 1fr; }
      .sheet-actions { grid-template-columns: 1fr; }
      :root { --slot-height: 55px; --time-col: 46px; }
    }
    @media (min-width: 760px) {
      .month-week { height: 240px; min-height: 240px; }
      .month-day { height: 240px; min-height: 240px; }
      .app { padding-left: 22px; padding-right: 22px; }
      .topbar { padding-left: 22px; padding-right: 22px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div class="title-row">
        <div class="brand">
          <div class="mark" aria-hidden="true"></div>
          <div>
            <h1 id="periodTitle">Май 2026</h1>
            <div class="period-sub" id="periodSub">Календарь мастера</div>
          </div>
        </div>
        <button class="install-btn" id="installBtn" type="button">Установить</button>
        <button class="icon-btn" id="resetBtn" title="Сбросить демо">↺</button>
      </div>
      <div class="nav-row">
        <button class="icon-btn" id="prevBtn" title="Назад">‹</button>
        <div class="mode-tabs">
          <button class="active" data-view="month">Месяц</button>
          <button data-view="day">День</button>
        </div>
        <button class="icon-btn" id="nextBtn" title="Вперёд">›</button>
      </div>
    </header>

    <section class="view active" id="monthView"></section>
    <section class="view" id="dayView"></section>
  </main>

  <div class="overlay" id="overlay"></div>

  <section class="sheet" id="entrySheet" aria-hidden="true">
    <div class="sheet-head">
      <h2 id="sheetTitle">Новая запись</h2>
      <button class="icon-btn" id="closeSheet">×</button>
    </div>
    <div class="sheet-body">
      <form id="entryForm">
        <input type="hidden" id="entryId">
        <input type="hidden" id="entryDate">
        <input type="hidden" id="entryType" value="mobile">
        <input type="hidden" id="entryDuration" value="60">
        <input type="hidden" id="entryAllDay" value="false">
        <input type="hidden" id="entryTime" value="10:00">
        <input type="hidden" id="entryEndTime" value="11:00">

        <div class="field">
          <label>Название записи</label>
          <input id="titleInput" required placeholder="Завод BMW X6">
        </div>
        <div class="field">
          <label>Тип записи</label>
          <div class="type-grid">
            <button type="button" class="active" data-type="mobile">Выезд</button>
            <button type="button" data-type="base">На базе</button>
            <button type="button" data-type="personal">Личный</button>
          </div>
        </div>

        <div class="field" id="timeField">
          <label>Время записи</label>
          <div class="time-wheel-wrap">
            <div class="time-wheel-col">
              <div class="time-wheel-title">Начало</div>
              <div class="time-wheel" id="hourWheel"></div>
            </div>
            <div class="time-wheel-col">
              <div class="time-wheel-title">Конец</div>
              <div class="time-wheel" id="minuteWheel"></div>
            </div>
          </div>
        </div>

        <div class="field">
          <label>Комментарий</label>
          <textarea id="commentInput" placeholder="Что важно помнить по записи"></textarea>
        </div>

        <div class="sheet-actions">
          <button type="submit" class="primary" id="submitBtn">Добавить запись</button>
          <button type="button" class="danger" id="deleteBtn" hidden>Удалить</button>
        </div>
      </form>
    </div>
  </section>

  <script>
    // state
    const STORAGE_KEY = 'pdr-fast-calendar-v1';
    const SETTINGS = { workStart: 9, workEnd: 19, stepMinutes: 30 };
    const state = {
      view: 'month',
      selectedDate: startOfDay(new Date()),
      entries: [],
      editingId: null,
      drag: null,
      monthRangeStart: -1,
      monthRangeEnd: 4,
      currentVisibleMonth: monthStart(new Date()),
      monthInitialized: false
    };
    const labels = {
      mobile: 'Выезд',
      base: 'На базе',
      personal: 'Личный'
    };

    // storage
    function loadEntries() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        try {
          const parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (error) {
          console.warn('Saved calendar data is corrupted, loading demo entries instead.', error);
          localStorage.setItem(`${STORAGE_KEY}-broken-${Date.now()}`, raw);
        }
      }
      const demo = demoEntries();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(demo));
      return demo;
    }
    function saveEntries() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.entries));
    }
    function resetDemo() {
      if (!confirm('Сбросить записи и вернуть демо?')) return;
      state.entries = demoEntries();
      saveEntries();
      render();
    }

    // date helpers
    function startOfDay(date) {
      const d = new Date(date);
      d.setHours(0, 0, 0, 0);
      return d;
    }
    function toISODate(date) {
      const d = startOfDay(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }
    function parseISODate(value) {
      const [y, m, d] = value.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function addDays(date, count) {
      const d = new Date(date);
      d.setDate(d.getDate() + count);
      return startOfDay(d);
    }
    function addMonths(date, count) {
      const d = new Date(date);
      d.setMonth(d.getMonth() + count, 1);
      return startOfDay(d);
    }
    function calendarRowStart(date) {
      const d = startOfDay(date);
      return addDays(d, -((d.getDay() + 6) % 7));
    }
    function monthStart(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }
    function monthKey(date) {
      const d = monthStart(date);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
    }
    function monthGridStart(date) {
      return calendarRowStart(monthStart(date));
    }
    function timeToMinutes(time) {
      const [h, m] = (time || '10:00').split(':').map(Number);
      return h * 60 + m;
    }
    function minutesToTime(total) {
      const safe = Math.max(0, Math.min(23 * 60 + 30, total));
      return `${String(Math.floor(safe / 60)).padStart(2, '0')}:${String(safe % 60).padStart(2, '0')}`;
    }
    function addMinutes(time, delta) {
      return minutesToTime(timeToMinutes(time) + delta);
    }
    function slotTimes() {
      const out = [];
      for (let min = SETTINGS.workStart * 60; min < SETTINGS.workEnd * 60; min += SETTINGS.stepMinutes) out.push(minutesToTime(min));
      return out;
    }
    function wheelTimes() {
      const out = [];
      for (let min = SETTINGS.workStart * 60; min <= SETTINGS.workEnd * 60; min += 10) out.push(minutesToTime(min));
      return out;
    }
    function formatPeriod() {
      if (state.view === 'month') return state.currentVisibleMonth.toLocaleDateString('ru-RU', { month: 'long', year: 'numeric' });
      return state.selectedDate.toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' });
    }
    function cap(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }
    function uid() {
      return 'entry-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 8);
    }
    function escapeHTML(value) {
      return String(value || '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' }[ch]));
    }
    function entriesForDate(date) {
      const iso = toISODate(date);
      return state.entries.filter(e => e.date === iso).sort((a, b) => Number(b.allDay) - Number(a.allDay) || timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
    }
    function entryById(id) {
      return state.entries.find(e => e.id === id);
    }
    function entryEndTime(entry) {
      return entry.endTime || addMinutes(entry.startTime || '10:00', entry.durationMinutes || 60);
    }
    function durationBetween(startTime, endTime) {
      return Math.max(10, timeToMinutes(endTime) - timeToMinutes(startTime));
    }

    // render
    function render() {
      syncTopbarHeight();
      periodTitle.textContent = cap(formatPeriod());
      periodSub.textContent = '';
      document.querySelectorAll('[data-view]').forEach(btn => btn.classList.toggle('active', btn.dataset.view === state.view));
      document.querySelectorAll('.view').forEach(view => view.classList.remove('active'));
      document.getElementById(state.view + 'View').classList.add('active');
      if (state.view === 'month') renderMonth();
      if (state.view === 'day') renderDay();
    }
    function syncTopbarHeight() {
      const height = document.querySelector('.topbar')?.offsetHeight || 118;
      document.documentElement.style.setProperty('--topbar-height', `${height}px`);
    }

    // render month
    function renderMonth() {
      const anchor = monthStart(state.selectedDate);
      const months = [];
      for (let offset = state.monthRangeStart; offset <= state.monthRangeEnd; offset++) months.push(addMonths(anchor, offset));
      const names = ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      monthView.innerHTML = `
        <div class="month-weekdays">${names.map(n => `<div>${n}</div>`).join('')}</div>
        <div class="month-grid">${months.map(monthSection).join('')}</div>
      `;
      bindDragAndDrop();
      window.removeEventListener('scroll', handleMonthScroll);
      window.addEventListener('scroll', handleMonthScroll, { passive: true });
      updateVisibleMonth();
      if (!state.monthInitialized) {
        state.monthInitialized = true;
        setTimeout(() => scrollToMonth(monthStart(state.selectedDate), 'auto'), 0);
      }
    }
    function monthSection(month) {
      const start = monthGridStart(month);
      const days = Array.from({ length: 42 }, (_, i) => addDays(start, i));
      const weeks = Array.from({ length: 6 }, (_, i) => days.slice(i * 7, i * 7 + 7))
        .filter(week => week.some(day => day.getMonth() === month.getMonth()));
      return `
        <section class="month-section" data-month="${monthKey(month)}">
          <div class="month-divider">${cap(month.toLocaleDateString('ru-RU', { month: 'long' }))}</div>
          ${weeks.map(week => `<div class="month-week">${week.map(day => monthCell(day, month)).join('')}</div>`).join('')}
        </section>
      `;
    }
    function monthCell(day, ownerMonth = state.selectedDate) {
      const outside = day.getMonth() !== ownerMonth.getMonth();
      if (outside) {
        return `
          <div class="month-day ghost-cell outside">
            <div class="day-num"><span class="day-num-inner">${day.getDate()}</span></div>
            <div class="day-items"></div>
          </div>
        `;
      }
      const list = entriesForDate(day);
      const visible = list.slice(0, 3);
      const today = toISODate(day) === toISODate(new Date());
      const selected = toISODate(day) === toISODate(state.selectedDate);
      return `
        <div class="month-day ${today ? 'today' : ''} ${selected ? 'selected' : ''}" data-date="${toISODate(day)}">
          <div class="day-num"><span class="day-num-inner ${today ? 'today' : ''}">${day.getDate()}</span></div>
          <div class="day-items">
            ${visible.map(entryChip).join('')}
            ${list.length > 3 ? `<div class="more">+${list.length - 3} ещё</div>` : ''}
          </div>
        </div>
      `;
    }
    function entryChip(entry) {
      return `
        <div class="entry-chip ${entry.type} ${entry.allDay ? 'all-day' : ''}" data-id="${entry.id}">
          <div class="entry-title" lang="ru">${escapeHTML(entry.title)}</div>
          <div class="entry-time">${escapeHTML(entry.startTime || '10:00')}</div>
        </div>
      `;
    }
    function handleMonthScroll() {
      if (state.view !== 'month') return;
      const scrollY = window.scrollY;
      const doc = document.documentElement;
      if (scrollY + window.innerHeight > doc.scrollHeight - 700) {
        state.monthRangeEnd += 3;
        renderMonthPreserveScroll();
      } else if (scrollY < 500) {
        const before = doc.scrollHeight;
        state.monthRangeStart -= 3;
        renderMonthPreserveScroll(before);
      } else {
        updateVisibleMonth();
      }
    }
    function renderMonthPreserveScroll(previousHeight) {
      const beforeTop = window.scrollY;
      renderMonth();
      if (previousHeight) window.scrollTo(0, beforeTop + (document.documentElement.scrollHeight - previousHeight));
      else window.scrollTo(0, beforeTop);
      updateVisibleMonth();
    }
    function updateVisibleMonth() {
      if (state.view !== 'month') return;
      const sections = [...document.querySelectorAll('.month-section')];
      if (!sections.length) return;
      const targetY = document.querySelector('.topbar').getBoundingClientRect().bottom + 16;
      let best = sections[0];
      let bestDistance = Infinity;
      sections.forEach(section => {
        const rect = section.getBoundingClientRect();
        const distance = Math.abs(rect.top - targetY);
        if (rect.bottom > targetY && distance < bestDistance) {
          best = section;
          bestDistance = distance;
        }
      });
      const [year, month] = best.dataset.month.split('-').map(Number);
      const visible = new Date(year, month - 1, 1);
      if (monthKey(visible) !== monthKey(state.currentVisibleMonth)) {
        state.currentVisibleMonth = visible;
        periodTitle.textContent = cap(formatPeriod());
      }
    }
    function scrollToMonth(month, behavior = 'smooth') {
      if (state.view !== 'month') return;
      const key = monthKey(month);
      let section = document.querySelector(`.month-section[data-month="${key}"]`);
      if (!section) {
        const anchor = monthStart(state.selectedDate);
        const diff = (month.getFullYear() - anchor.getFullYear()) * 12 + month.getMonth() - anchor.getMonth();
        state.monthRangeStart = Math.min(state.monthRangeStart, diff - 1);
        state.monthRangeEnd = Math.max(state.monthRangeEnd, diff + 1);
        renderMonth();
        section = document.querySelector(`.month-section[data-month="${key}"]`);
      }
      section?.scrollIntoView({ behavior, block: 'start' });
      state.currentVisibleMonth = monthStart(month);
      periodTitle.textContent = cap(formatPeriod());
    }

    // render day
    function renderDay() {
      const allDay = entriesForDate(state.selectedDate).filter(e => e.allDay);
      const timed = entriesForDate(state.selectedDate).filter(e => !e.allDay);
      const allDayHtml = allDay.length ? `<div class="all-day-row">${allDay.map(e => `<div class="all-day-card ${e.type}" data-id="${e.id}"><span>${escapeHTML(e.title)}</span><small>${escapeHTML(e.startTime || '10:00')}</small></div>`).join('')}</div>` : '';
      const slots = slotTimes().map((time, row) => `
        <div class="time-cell" style="grid-row:${row + 1};grid-column:1">${time}</div>
        <div class="grid-cell" data-date="${toISODate(state.selectedDate)}" data-time="${time}" style="grid-row:${row + 1};grid-column:2"></div>
      `).join('');
      dayView.innerHTML = allDayHtml + `<div class="schedule">${slots}${timed.map(timeCard).join('')}</div>`;
      bindDragAndDrop();
    }
    function timeCard(entry) {
      const slotHeight = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--slot-height'));
      const startOffset = Math.max(0, timeToMinutes(entry.startTime) - SETTINGS.workStart * 60);
      const top = startOffset / SETTINGS.stepMinutes * slotHeight + 4;
      const endTime = entryEndTime(entry);
      const durationMinutes = durationBetween(entry.startTime, endTime);
      const height = Math.max(48, durationMinutes / SETTINGS.stepMinutes * slotHeight - 8);
      const comment = entry.comment ? `<div class="meta">${escapeHTML(entry.comment)}</div>` : '';
      return `
        <article class="time-card ${entry.type}" data-id="${entry.id}" style="top:${top}px;height:${height}px">
          <div class="time">${entry.startTime}–${endTime}</div>
          <div class="name">${escapeHTML(entry.title)}</div>
          ${comment}
        </article>
      `;
    }

    // event actions
    function defaultEntry(dateValue = toISODate(state.selectedDate), timeValue = '10:00') {
      return {
        id: '',
        title: '',
        type: 'mobile',
        date: dateValue,
        startTime: timeValue,
        endTime: addMinutes(timeValue, 60),
        durationMinutes: 60,
        allDay: false,
        comment: ''
      };
    }
    function setType(type) {
      entryType.value = type;
      document.querySelectorAll('[data-type]').forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
    }
    function setTime(startValue, endValue = addMinutes(startValue, 60)) {
      const startTime = normalizeStartTime(startValue);
      const endTime = normalizeEndTime(startTime, endValue);
      entryTime.value = startTime;
      entryEndTime.value = endTime;
      entryDuration.value = String(durationBetween(startTime, endTime));
      entryAllDay.value = 'false';
      renderTimeWheels(startTime, endTime);
    }
    function normalizeWorkTime(value = '10:00') {
      let [hour, minute] = value.split(':').map(Number);
      hour = Math.max(9, Math.min(19, Number.isFinite(hour) ? hour : 10));
      minute = Math.round((Number.isFinite(minute) ? minute : 0) / 10) * 10;
      if (minute >= 60) {
        minute = 0;
        hour = Math.min(19, hour + 1);
      }
      return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
    }
    function normalizeStartTime(value = '10:00') {
      const latestStart = SETTINGS.workEnd * 60 - 10;
      return minutesToTime(Math.min(timeToMinutes(normalizeWorkTime(value)), latestStart));
    }
    function normalizeEndTime(startTime, value = addMinutes(startTime, 60)) {
      let endTime = normalizeWorkTime(value);
      if (timeToMinutes(endTime) <= timeToMinutes(startTime)) endTime = addMinutes(startTime, 60);
      if (timeToMinutes(endTime) > SETTINGS.workEnd * 60) endTime = minutesToTime(SETTINGS.workEnd * 60);
      if (timeToMinutes(endTime) <= timeToMinutes(startTime)) endTime = addMinutes(startTime, 10);
      return endTime;
    }
    function renderTimeWheels(startValue = entryTime.value || '10:00', endValue = entryEndTime.value || '11:00') {
      const activeStart = normalizeStartTime(startValue);
      const activeEnd = normalizeEndTime(activeStart, endValue);
      const times = wheelTimes();
      const startTimes = times.filter(time => timeToMinutes(time) < SETTINGS.workEnd * 60);
      hourWheel.innerHTML = `<div class="time-option spacer"></div>${startTimes.map(time => `<div class="time-option ${time === activeStart ? 'active' : ''}" data-wheel-start="${time}">${time}</div>`).join('')}<div class="time-option spacer"></div>`;
      minuteWheel.innerHTML = `<div class="time-option spacer"></div>${times.map(time => `<div class="time-option ${time === activeEnd ? 'active' : ''}" data-wheel-end="${time}">${time}</div>`).join('')}<div class="time-option spacer"></div>`;
      requestAnimationFrame(() => {
        hourWheel.querySelector('.time-option.active')?.scrollIntoView({ block: 'center' });
        minuteWheel.querySelector('.time-option.active')?.scrollIntoView({ block: 'center' });
      });
    }
    function updateTimeFromWheels() {
      const startTime = normalizeStartTime(activeWheelValue(hourWheel, 'wheelStart') || entryTime.value || '10:00');
      const rawEndTime = activeWheelValue(minuteWheel, 'wheelEnd') || entryEndTime.value || addMinutes(startTime, 60);
      const endTime = normalizeEndTime(startTime, rawEndTime);
      entryTime.value = startTime;
      entryEndTime.value = endTime;
      entryDuration.value = String(durationBetween(startTime, endTime));
      if (endTime !== rawEndTime) renderTimeWheels(startTime, endTime);
    }
    function activeWheelValue(wheel, key) {
      const wheelRect = wheel.getBoundingClientRect();
      const center = wheelRect.top + wheelRect.height / 2;
      let best = null;
      let distance = Infinity;
      wheel.querySelectorAll(`[data-${key.replace(/[A-Z]/g, m => '-' + m.toLowerCase())}]`).forEach(option => {
        const rect = option.getBoundingClientRect();
        const optionCenter = rect.top + rect.height / 2;
        const currentDistance = Math.abs(optionCenter - center);
        if (currentDistance < distance) {
          distance = currentDistance;
          best = option;
        }
      });
      if (!best) return '';
      wheel.querySelectorAll('.time-option').forEach(option => option.classList.toggle('active', option === best));
      return best.dataset[key];
    }
    function openSheetForNew(dateValue, timeValue = '10:00') {
      openEditor(defaultEntry(dateValue, timeValue));
    }
    function openEditor(entry) {
      const isEdit = Boolean(entry.id);
      state.editingId = entry.id || null;
      entryForm.reset();
      sheetTitle.textContent = isEdit ? 'Редактировать' : 'Новая запись';
      submitBtn.textContent = isEdit ? 'Сохранить' : 'Добавить запись';
      deleteBtn.hidden = !isEdit;
      entryId.value = entry.id || '';
      entryDate.value = entry.date;
      titleInput.value = entry.title || '';
      commentInput.value = entry.comment || '';
      setType(entry.type || 'mobile');
      setTime(entry.startTime || '10:00', entryEndTime(entry));
      overlay.classList.add('open');
      entrySheet.classList.add('open');
    }
    function closeBottomSheet() {
      overlay.classList.remove('open');
      entrySheet.classList.remove('open');
      state.editingId = null;
    }
    function saveEntryFromForm() {
      const now = new Date().toISOString();
      const data = {
        id: entryId.value,
        title: titleInput.value.trim(),
        type: entryType.value,
        date: entryDate.value,
        startTime: entryTime.value,
        endTime: entryEndTime.value,
        durationMinutes: durationBetween(entryTime.value, entryEndTime.value),
        allDay: false,
        comment: commentInput.value.trim()
      };
      if (data.id) {
        state.entries = state.entries.map(entry => entry.id === data.id ? { ...entry, ...data, updatedAt: now } : entry);
      } else {
        state.entries.push({ ...data, id: uid(), createdAt: now, updatedAt: now });
      }
      saveEntries();
      closeBottomSheet();
      render();
    }
    function deleteEntry() {
      if (!state.editingId || !confirm('Удалить запись?')) return;
      state.entries = state.entries.filter(entry => entry.id !== state.editingId);
      saveEntries();
      closeBottomSheet();
      render();
    }
    function moveEntry(id, dateValue, timeValue) {
      const entry = entryById(id);
      if (!entry) return;
      const duration = durationBetween(entry.startTime || '10:00', entryEndTime(entry));
      const nextStartTime = timeValue || entry.startTime;
      state.entries = state.entries.map(item => item.id === id ? {
        ...item,
        date: dateValue,
        startTime: nextStartTime,
        endTime: timeValue ? normalizeEndTime(nextStartTime, addMinutes(nextStartTime, duration)) : entryEndTime(item),
        durationMinutes: duration,
        updatedAt: new Date().toISOString()
      } : item);
      state.selectedDate = parseISODate(dateValue);
      saveEntries();
      render();
    }

    // drag and drop
    function bindDragAndDrop() {
      document.querySelectorAll('[data-id]').forEach(el => {
        el.addEventListener('click', event => {
          if (state.drag?.moved) return;
          event.stopPropagation();
          const entry = entryById(el.dataset.id);
          if (entry) openEditor(entry);
        });
        el.addEventListener('pointerdown', startPointerDrag);
      });
    }
    function startPointerDrag(event) {
      if (event.button && event.button !== 0) return;
      const source = event.currentTarget;
      state.drag = {
        id: source.dataset.id,
        source,
        pointerId: event.pointerId,
        x: event.clientX,
        y: event.clientY,
        moved: false,
        active: event.pointerType !== 'touch',
        ghost: null,
        target: null,
        timer: null
      };
      source.setPointerCapture?.(event.pointerId);
      source.addEventListener('pointermove', pointerMove);
      source.addEventListener('pointerup', pointerEnd, { once: true });
      source.addEventListener('pointercancel', pointerEnd, { once: true });
      if (event.pointerType === 'touch') {
        state.drag.timer = setTimeout(() => {
          if (!state.drag) return;
          state.drag.active = true;
          state.drag.moved = true;
          state.drag.source.classList.add('dragging');
          if (!state.drag.ghost) state.drag.ghost = createDragGhost(state.drag.id);
          positionDragGhost(state.drag.x, state.drag.y);
          updateDropTarget(state.drag.x, state.drag.y);
        }, 280);
      }
    }
    function pointerMove(event) {
      if (!state.drag) return;
      const dx = event.clientX - state.drag.x;
      const dy = event.clientY - state.drag.y;
      const distance = Math.abs(dx) + Math.abs(dy);
      if (!state.drag.active && distance > 12) {
        clearTimeout(state.drag.timer);
        state.drag.timer = null;
        return;
      }
      if (state.drag.active && distance > 6) {
        event.preventDefault();
        state.drag.moved = true;
        state.drag.source.classList.add('dragging');
        if (!state.drag.ghost) state.drag.ghost = createDragGhost(state.drag.id);
        positionDragGhost(event.clientX, event.clientY);
        updateDropTarget(event.clientX, event.clientY);
      }
    }
    function pointerEnd(event) {
      const drag = state.drag;
      if (!drag) return;
      clearTimeout(drag.timer);
      drag.source.classList.remove('dragging');
      drag.source.removeEventListener('pointermove', pointerMove);
      const target = document.elementFromPoint(event.clientX, event.clientY)?.closest('.month-day, .grid-cell');
      if (drag.moved && drag.active && target?.dataset.date) moveEntry(drag.id, target.dataset.date, target.dataset.time);
      clearDropTarget();
      drag.ghost?.remove();
      setTimeout(() => { state.drag = null; }, 250);
    }
    function createDragGhost(id) {
      const entry = entryById(id);
      const ghost = document.createElement('div');
      ghost.className = `drag-ghost ${entry.type} ${entry.allDay ? 'all-day' : ''}`;
      ghost.innerHTML = `
        <div class="drag-ghost-title">${escapeHTML(entry.title)}</div>
        ${entry.allDay ? '' : `<div class="drag-ghost-time">${escapeHTML(entry.startTime)}</div>`}
      `;
      document.body.appendChild(ghost);
      return ghost;
    }
    function positionDragGhost(x, y) {
      if (!state.drag?.ghost) return;
      state.drag.ghost.style.left = `${x}px`;
      state.drag.ghost.style.top = `${y}px`;
    }
    function updateDropTarget(x, y) {
      const target = document.elementFromPoint(x, y)?.closest('.month-day, .grid-cell');
      if (target === state.drag.target) return;
      clearDropTarget();
      if (target?.dataset.date) {
        target.classList.add('drop-target');
        state.drag.target = target;
      }
    }
    function clearDropTarget() {
      document.querySelectorAll('.drop-target').forEach(el => el.classList.remove('drop-target'));
      if (state.drag) state.drag.target = null;
    }

    // bottom sheet
    entryForm.addEventListener('submit', event => {
      event.preventDefault();
      saveEntryFromForm();
    });
    closeSheet.addEventListener('click', closeBottomSheet);
    overlay.addEventListener('click', closeBottomSheet);
    deleteBtn.addEventListener('click', deleteEntry);
    document.querySelectorAll('[data-type]').forEach(btn => btn.addEventListener('click', () => setType(btn.dataset.type)));
    const wheelTimers = new WeakMap();
    [hourWheel, minuteWheel].forEach(wheel => {
      wheel.addEventListener('scroll', () => {
        updateTimeFromWheels();
        clearTimeout(wheelTimers.get(wheel));
        wheelTimers.set(wheel, setTimeout(() => {
          const active = wheel.querySelector('.time-option.active');
          active?.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 120));
      }, { passive: true });
    });
    // UI handlers
    document.querySelectorAll('[data-view]').forEach(btn => btn.addEventListener('click', () => {
      state.view = btn.dataset.view;
      render();
      if (state.view === 'month') setTimeout(() => scrollToMonth(monthStart(new Date()), 'auto'), 0);
      if (state.view === 'day') setTimeout(() => window.scrollTo({ top: 0, behavior: 'auto' }), 0);
    }));
    prevBtn.addEventListener('click', () => {
      if (state.view === 'month') scrollToMonth(addMonths(state.currentVisibleMonth, -1));
      else {
        state.selectedDate = addDays(state.selectedDate, -1);
        render();
      }
    });
    nextBtn.addEventListener('click', () => {
      if (state.view === 'month') scrollToMonth(addMonths(state.currentVisibleMonth, 1));
      else {
        state.selectedDate = addDays(state.selectedDate, 1);
        render();
      }
    });
    resetBtn.addEventListener('click', resetDemo);
    window.addEventListener('resize', syncTopbarHeight);
    monthView.addEventListener('click', event => {
      if (state.drag?.moved) return;
      const day = event.target.closest('.month-day');
      if (!day || event.target.closest('[data-id]')) return;
      openSheetForNew(day.dataset.date, '10:00');
    });
    dayView.addEventListener('click', event => {
      if (state.drag?.moved) return;
      const slot = event.target.closest('.grid-cell');
      if (!slot || event.target.closest('[data-id]')) return;
      openSheetForNew(slot.dataset.date, slot.dataset.time);
    });

    // demo data
    function demoEntries() {
      const today = startOfDay(new Date());
      const tomorrow = addDays(today, 1);
      const plusTwo = addDays(today, 2);
      const plusThree = addDays(today, 3);
      const now = new Date().toISOString();
      return [
        { id: uid(), title: 'Завод BMW X6', type: 'mobile', date: toISODate(today), startTime: '17:00', endTime: '18:00', durationMinutes: 60, allDay: false, comment: 'Осмотреть переднее крыло.', createdAt: now, updatedAt: now },
        { id: uid(), title: 'На базе Camry', type: 'base', date: toISODate(tomorrow), startTime: '12:00', endTime: '14:00', durationMinutes: 120, allDay: false, comment: '', createdAt: now, updatedAt: now },
        { id: uid(), title: 'Стрижка', type: 'personal', date: toISODate(plusTwo), startTime: '14:30', endTime: '15:30', durationMinutes: 60, allDay: false, comment: '', createdAt: now, updatedAt: now },
        { id: uid(), title: 'Выходной', type: 'personal', date: toISODate(plusThree), startTime: '10:00', endTime: '11:00', durationMinutes: 60, allDay: false, comment: '', createdAt: now, updatedAt: now }
      ];
    }

    state.entries = loadEntries();
    render();
  </script>

  <script>
    let deferredInstallPrompt = null;
    const installButton = document.getElementById('installBtn');

    window.addEventListener('beforeinstallprompt', event => {
      event.preventDefault();
      deferredInstallPrompt = event;
      installButton?.classList.add('show');
    });

    installButton?.addEventListener('click', async () => {
      if (!deferredInstallPrompt) return;
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      installButton.classList.remove('show');
    });

    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      installButton?.classList.remove('show');
    });

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => reg.update())
          .catch(err => console.warn('Service worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
