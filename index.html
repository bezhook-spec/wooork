<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Доходы PDR S23 Plus</title>
  <style>
    :root{
      --bg:#0f1412;
      --card:#17201c;
      --card2:#1d2823;
      --text:#eef7f1;
      --muted:#aab8af;
      --line:#2a3932;
      --green:#50c878;
      --green2:#76e29a;
      --red:#ff6b6b;
      --yellow:#f1c453;
      --input:#101714;
      --shadow: 0 18px 40px rgba(0,0,0,.28);
      --radius:18px;
    }
    *{box-sizing:border-box}
    html{height:100%}
    body{
      margin:0;
      min-height:100%;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:radial-gradient(circle at top right,rgba(80,200,120,.18),transparent 32%),var(--bg);
      color:var(--text);
      padding:7px;
      -webkit-tap-highlight-color:transparent;
    }
    .wrap{max-width:1060px;margin:0 auto 90px}
    header{
      display:flex;
      gap:14px;
      align-items:flex-start;
      justify-content:space-between;
      margin-bottom:8px;
    }
    h1{margin:0;font-size:25px;letter-spacing:-.03em}
    h2{margin:0 0 12px;font-size:18px}
    .sub{color:var(--muted);font-size:14px;margin-top:5px}
    .tabs{
      display:flex;
      gap:8px;
      background:rgba(23,32,28,.72);
      border:1px solid var(--line);
      padding:2px;
      border-radius:999px;
      position:sticky;
      top:10px;
      z-index:5;
      backdrop-filter:blur(12px);
      margin-bottom:3px;
    }
    .tab{
      flex:1;
      border:0;
      border-radius:999px;
      padding:5px 4px;
      color:var(--muted);
      background:transparent;
      font-weight:750;
      cursor:pointer;
    }
    .tab.active{background:var(--green);color:#07100b}
    .grid{display:grid;grid-template-columns:1fr;gap:14px;max-width:760px}
    .card{
      background:linear-gradient(180deg,rgba(29,40,35,.94),rgba(23,32,28,.94));
      border:1px solid var(--line);
      border-radius:var(--radius);
      padding:8px;
      box-shadow:var(--shadow);
    }
    label{display:block;color:var(--muted);font-size:12px;margin:0 0 4px}
    input,select,button,textarea{font:inherit}
    input,select{
      width:100%;
      border:1px solid var(--line);
      background:var(--input);
      color:var(--text);
      border-radius:14px;
      padding:9px 10px;
      outline:none;
      min-height:40px;
    }
    input:focus,select:focus{border-color:rgba(80,200,120,.8)}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .field{margin-bottom:6px}
    .btn{
      border:0;
      border-radius:14px;
      padding:9px 10px;
      font-weight:850;
      cursor:pointer;
      background:var(--card2);
      color:var(--text);
      border:1px solid var(--line);
      min-height:38px;
    }
    .btn.primary{
      background:linear-gradient(180deg,var(--green2),var(--green));
      color:#07100b;
      border:0;
      width:100%;
      font-size:17px;
      padding:8px;
      min-height:56px;
    }
    .btn.danger{border-color:rgba(255,107,107,.5);color:#ffd0d0}
    .btn.small{padding:9px 11px;font-size:13px;border-radius:12px;min-height:38px}
    .chips{display:flex;gap:5px;flex-wrap:wrap}
    .chip{
      border:1px solid var(--line);
      background:var(--input);
      color:var(--muted);
      border-radius:999px;
      padding:7px 9px;
      cursor:pointer;
      user-select:none;
      font-weight:750;
      font-size:14px;
      min-height:34px;
    }
    .chip.active{
      background:rgba(80,200,120,.16);
      color:var(--green2);
      border-color:rgba(80,200,120,.75);
    }
    .paymentButtons,.statusButtons{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:5px;
      margin-top:5px;
    }
    .statusButtons{grid-template-columns:1fr 1fr}
    .paymentBtn,.statusBtn{
      border:1px solid var(--line);
      background:var(--input);
      color:var(--muted);
      border-radius:14px;
      padding:9px 6px;
      cursor:pointer;
      user-select:none;
      font-weight:900;
      font-size:14px;
      min-height:40px;
    }
    .paymentBtn.active,.statusBtn.active{
      background:rgba(80,200,120,.16);
      color:var(--green2);
      border-color:rgba(80,200,120,.75);
    }
    .selectedBox{
      border:1px solid var(--line);
      background:rgba(16,23,20,.72);
      border-radius:15px;
      padding:7px;
      min-height:48px;
    }
    .selectedBox .none{color:var(--muted);font-size:14px}
    .selectedField.emptySelected{display:none}
    .compactCarPanel{padding-top:10px}
    .stats{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .stat{
      background:rgba(16,23,20,.72);
      border:1px solid var(--line);
      border-radius:16px;
      padding:9px;
    }
    .stat .name{color:var(--muted);font-size:13px}
    .stat .num{font-size:24px;font-weight:900;margin-top:4px;letter-spacing:-.03em}
    .num.good{color:var(--green2)}
    .num.bad{color:var(--yellow)}
    .hint{margin-top:12px;color:var(--muted);font-size:13px;line-height:1.45}
    .toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
    .search{flex:1;min-width:170px}
    .tableWrap{overflow:auto;border:1px solid var(--line);border-radius:16px}
    table{width:100%;border-collapse:collapse;min-width:760px}
    th,td{padding:11px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:top;font-size:14px}
    th{color:var(--muted);background:rgba(16,23,20,.85);position:sticky;top:0}
    tr:last-child td{border-bottom:0}
    .badge{display:inline-block;border-radius:999px;padding:5px 9px;font-weight:800;font-size:12px;white-space:nowrap}
    .paid{background:rgba(80,200,120,.16);color:var(--green2)}
    .unpaid{background:rgba(241,196,83,.16);color:var(--yellow)}
    .hidden{display:none}
    .listEditor{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .items{display:flex;flex-direction:column;gap:8px;margin-top:10px}
    .itemLine{
      display:flex;gap:8px;align-items:center;justify-content:space-between;
      background:rgba(16,23,20,.72);border:1px solid var(--line);border-radius:13px;padding:9px 10px;
    }
    .itemLine span{overflow:hidden;text-overflow:ellipsis}
    .empty{color:var(--muted);text-align:center;padding:28px}
    .toast{
      position:fixed;left:50%;bottom:22px;transform:translateX(-50%);
      background:#e9fff0;color:#07100b;padding:12px 15px;border-radius:999px;font-weight:800;
      box-shadow:0 12px 30px rgba(0,0,0,.35);opacity:0;pointer-events:none;transition:.18s;z-index:20;
      white-space:nowrap;
    }
    .toast.show{opacity:1;bottom:30px}

    .carPanel{
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 50% 18%, rgba(80,200,120,.10), transparent 30%),
        rgba(16,23,20,.74);
      border-radius:18px;
      padding:7px;
      overflow:hidden;
    }
    .carTop{
      display:flex;
      justify-content:space-between;
      gap:6px;
      align-items:center;
      margin-bottom:8px;
    }
    .carTop .title{font-weight:900}
    .carTop .mini{color:var(--muted);font-size:12px}
    .carSvgWrap{
      width:100%;
      overflow:auto;
      padding:4px;
      overscroll-behavior-x:contain;
    }
    svg.car{
      width:100%;
      min-width:500px;
      max-width:720px;
      display:block;
      margin:auto;
      touch-action:manipulation;
    }
    .part{
      fill:#1c2a24;
      stroke:#6c7b72;
      stroke-width:1.8;
      cursor:pointer;
      transition:.14s;
    }
    .part:hover{fill:#294236;stroke:#91e7aa}
    .part.selected{
      fill:rgba(80,200,120,.72);
      stroke:#d9ffe3;
      filter: drop-shadow(0 0 8px rgba(80,200,120,.55));
    }
    .labelSvg{
      fill:#eaf6ee;
      font-size:12px;
      font-weight:800;
      pointer-events:none;
      text-anchor:middle;
      dominant-baseline:middle;
    }
    .carNose{fill:none;stroke:#6c7b72;stroke-width:2;opacity:.8;pointer-events:none}
    .legend{
      display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;color:var(--muted);font-size:12px;
    }
    .legend span{border:1px solid var(--line);border-radius:999px;padding:6px 8px;background:rgba(16,23,20,.65)}

    .quickClients{
      display:grid;
      grid-template-columns:repeat(3,minmax(0,1fr));
      gap:7px;
      margin-top:8px;
    }
    .quickClientBtn{
      border:1px solid var(--line);
      background:rgba(16,23,20,.72);
      color:var(--muted);
      border-radius:999px;
      padding:8px 10px;
      cursor:pointer;
      font-size:13px;
      font-weight:800;
      min-height:36px;
      white-space:nowrap;
      min-width:0;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .quickClientBtn.active{
      background:rgba(80,200,120,.16);
      color:var(--green2);
      border-color:rgba(80,200,120,.75);
    }
    .clientStats{
      margin-top:14px;
      display:grid;
      gap:8px;
    }
    .clientStatLine{
      display:grid;
      grid-template-columns:1fr auto auto;
      gap:6px;
      align-items:center;
      background:rgba(16,23,20,.72);
      border:1px solid var(--line);
      border-radius:14px;
      padding:7px;
      color:var(--muted);
      font-size:14px;
    }
    .clientStatLine b{color:var(--text)}
    .clientStatLine .sum{color:var(--green2);font-weight:900}




    .carField{margin-bottom:4px}
    .carField label,.pricePaymentField label,.statusField label{font-size:11px;margin-bottom:2px}
    .carField input{
      min-height:34px;
      padding:6px 8px;
      font-size:14px;
    }
    .pricePaymentField input{
      min-height:36px;
      padding:7px 9px;
      font-size:15px;
    }
    .pricePaymentField{margin-bottom:4px}
    .statusField{margin-bottom:4px}
    .paymentButtons,.statusButtons{
      gap:4px;
      margin-top:4px;
    }
    .paymentBtn,.statusBtn{
      min-height:34px;
      padding:6px 4px;
      font-size:12px;
      border-radius:10px;
    }
    .btn.primary{
      min-height:38px;
      padding:8px;
      font-size:15px;
      border-radius:11px;
    }
    .stickySave{
      margin-top:2px;
      bottom:4px;
    }

    .dateClientRow{grid-template-columns:.72fr 1.28fr}
    .dateField input{
      padding-left:7px;
      padding-right:5px;
      font-size:13px;
      letter-spacing:-.03em;
    }

    .filterSummary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:3px;
    }
    .summaryBox{
      background:rgba(16,23,20,.72);
      border:1px solid var(--line);
      border-radius:14px;
      padding:7px;
    }
    .summaryBox .name{color:var(--muted);font-size:12px}
    .summaryBox .value{font-size:18px;font-weight:950;margin-top:2px}
    .tableActions{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-bottom:3px;
    }
    .btn.print{
      background:rgba(80,200,120,.16);
      border-color:rgba(80,200,120,.55);
      color:var(--green2);
    }
    .btn.pay{
      background:rgba(241,196,83,.13);
      border-color:rgba(241,196,83,.55);
      color:var(--yellow);
    }

    .mobileCards{display:none}
    .recordCard{
      border:1px solid var(--line);
      background:rgba(16,23,20,.72);
      border-radius:16px;
      padding:7px;
      margin-bottom:3px;
    }
    .recordTop{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:6px;
      margin-bottom:8px;
    }
    .recordTitle{font-weight:900}
    .recordMeta{color:var(--muted);font-size:13px;margin-top:2px}
    .recordPrice{font-size:20px;font-weight:950;white-space:nowrap}
    .recordLine{font-size:14px;color:var(--muted);margin-top:7px}
    .recordLine b{color:var(--text)}
    .stickySave{
      position:sticky;
      bottom:10px;
      z-index:4;
      margin-top:8px;
    }

<script>
(() => {
  const STORAGE_KEY = "pdr_income_mobile_v1";

  const bodyParts = [
    "Капот", "Крыша", "Крышка багажника",
    "Крыло переднее левое", "Крыло переднее правое",
    "Дверь передняя левая", "Дверь передняя правая",
    "Дверь задняя левая", "Дверь задняя правая",
    "Крыло заднее левое", "Крыло заднее правое",
    "Стойка левая", "Стойка правая", "Порог левый", "Порог правый"
  ];

  const defaults = {
    clients: ["Частный клиент", "Организация 1", "Организация 2"],
    extraElements: ["Лючок бензобака", "Арка", "Ребро жесткости"],
    records: []
  };

  let state = load();
  let selectedElements = [];
  let selectedStatus = "оплачено";
  let selectedPayment = "наличные";

  const $ = (id) => document.getElementById(id);
  const fmt = new Intl.NumberFormat("ru-RU");

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return structuredClone(defaults);
      const parsed = JSON.parse(raw);
      return {
        clients: parsed.clients?.length ? parsed.clients : defaults.clients,
        extraElements: Array.isArray(parsed.extraElements) ? parsed.extraElements : defaults.extraElements,
        records: Array.isArray(parsed.records) ? parsed.records : []
      };
    }catch(e){
      return structuredClone(defaults);
    }
  }

  function save(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  function money(n){
    return fmt.format(Number(n || 0)) + " ₽";
  }

  function todayISO(){
    const d = new Date();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0,10);
  }

  function showToast(text="Сохранено"){
    const t = $("toast");
    t.textContent = text;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 1200);
  }

  function escapeHtml(s){
    return String(s ?? "").replace(/[&<>"']/g, ch => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
    }[ch]));
  }

  function topClients(limit = 5){
    const score = new Map();

    state.clients.forEach(c => score.set(c, {name:c, count:0, last:0, sum:0}));

    state.records.forEach(r => {
      if(!r.client) return;
      if(!score.has(r.client)) score.set(r.client, {name:r.client, count:0, last:0, sum:0});
      const item = score.get(r.client);
      item.count += 1;
      item.sum += Number(r.price || 0);
      item.last = Math.max(item.last, Number(r.id || 0));
    });

    const rows = [...score.values()]
      .sort((a,b) => (b.last - a.last) || (b.count - a.count) || a.name.localeCompare(b.name))
      .slice(0, limit);

    return rows;
  }

  function renderQuickClients(){
    const current = $("client").value;
    const rows = topClients(3);

    $("quickClients").innerHTML = rows.map(c => `
      <button type="button" class="quickClientBtn ${c.name === current ? "active" : ""}" data-quick-client="${escapeHtml(c.name)}">
        ${escapeHtml(c.name)}
      </button>
    `).join("");
  }

  function renderClients(){
    const current = $("client").value;
    $("client").innerHTML = state.clients.map(c => `<option ${c === current ? "selected" : ""}>${escapeHtml(c)}</option>`).join("");
    $("clientsList").innerHTML = state.clients.map((c,i) => `
      <div class="itemLine">
        <span>${escapeHtml(c)}</span>
        <button class="btn small danger" data-del-client="${i}">×</button>
      </div>
    `).join("");
    renderQuickClients();

    const currentFilter = $("clientFilter") ? $("clientFilter").value : "";
    if($("clientFilter")){
      $("clientFilter").innerHTML = `<option value="">Все организации</option>` + state.clients.map(c => `
        <option value="${escapeHtml(c)}" ${c === currentFilter ? "selected" : ""}>${escapeHtml(c)}</option>
      `).join("");
    }
  }

  function renderSelectedElements(){
    document.querySelectorAll(".part").forEach(p => {
      p.classList.toggle("selected", selectedElements.includes(p.dataset.part));
    });

    $("selectedField").classList.toggle("emptySelected", !selectedElements.length);

    if(!selectedElements.length){
      $("selectedElementsBox").innerHTML = ``;
      return;
    }

    $("selectedElementsBox").innerHTML = `
      <div class="chips">
        ${selectedElements.map(el => `
          <button type="button" class="chip active" data-remove-selected="${escapeHtml(el)}">${escapeHtml(el)} ×</button>
        `).join("")}
      </div>
    `;
  }

  function renderExtraElements(){
    $("elementsList").innerHTML = state.extraElements.map((el,i) => `
      <div class="itemLine">
        <span>${escapeHtml(el)}</span>
        <div style="display:flex;gap:6px">
          <button class="btn small" data-add-extra="${escapeHtml(el)}">Выбрать</button>
          <button class="btn small danger" data-del-element="${i}">×</button>
        </div>
      </div>
    `).join("");
  }

  function renderPayment(){
    document.querySelectorAll(".paymentBtn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.payment === selectedPayment);
    });
  }

  function renderStats(){
    const now = new Date();
    const ym = now.toISOString().slice(0,7);
    const today = todayISO();

    const monthPaid = state.records
      .filter(r => r.date?.startsWith(ym) && r.status === "оплачено")
      .reduce((s,r) => s + Number(r.price || 0), 0);

    const totalDebt = state.records
      .filter(r => r.status === "не оплачено")
      .reduce((s,r) => s + Number(r.price || 0), 0);

    const todaySum = state.records
      .filter(r => r.date === today && r.status === "оплачено")
      .reduce((s,r) => s + Number(r.price || 0), 0);

    $("monthPaid").textContent = money(monthPaid);
    $("totalDebt").textContent = money(totalDebt);
    $("countAll").textContent = String(state.records.length);
    $("todaySum").textContent = money(todaySum);

    const clientTotals = topClients(8)
      .filter(c => c.count > 0)
      .sort((a,b) => b.count - a.count || b.sum - a.sum);

    $("clientStats").innerHTML = clientTotals.length
      ? `<h2 style="margin-top:18px">Топ клиентов</h2>` + clientTotals.map(c => `
          <div class="clientStatLine">
            <b>${escapeHtml(c.name)}</b>
            <span>${c.count} зак.</span>
            <span class="sum">${money(c.sum)}</span>
          </div>
        `).join("")
      : `<div class="hint">Пока нет статистики по клиентам. Она появится после первых записей.</div>`;
  }

  function getFilteredRows(){
    const q = $("searchInput").value.trim().toLowerCase();
    const status = $("statusFilter").value;
    const client = $("clientFilter") ? $("clientFilter").value : "";

    let rows = [...state.records].sort((a,b) => (b.date || "").localeCompare(a.date || "") || b.id - a.id);

    if(client){
      rows = rows.filter(r => r.client === client);
    }

    if(q){
      rows = rows.filter(r =>
        [r.client, r.car, r.elements?.join(", "), r.paymentMethod, r.status]
          .join(" ")
          .toLowerCase()
          .includes(q)
      );
    }

    if(status){
      rows = rows.filter(r => r.status === status);
    }

    return rows;
  }

  function filteredTotals(rows){
    return {
      total: rows.reduce((s,r) => s + Number(r.price || 0), 0),
      debt: rows.filter(r => r.status === "не оплачено").reduce((s,r) => s + Number(r.price || 0), 0),
      unpaidCount: rows.filter(r => r.status === "не оплачено").length
    };
  }

  function renderTable(){
    const rows = getFilteredRows();
    const totals = filteredTotals(rows);

    if($("filteredTotal")) $("filteredTotal").textContent = money(totals.total);
    if($("filteredDebt")) $("filteredDebt").textContent = money(totals.debt);
    if($("markFilteredPaidBtn")){
      $("markFilteredPaidBtn").disabled = totals.unpaidCount === 0;
      $("markFilteredPaidBtn").textContent = totals.unpaidCount
        ? `Отметить долг оплаченным (${totals.unpaidCount})`
        : "Нет неоплаченных";
    }

    if(!rows.length){
      $("recordsBody").innerHTML = `<tr><td colspan="8" class="empty">Записей пока нет</td></tr>`;
      $("recordsCards").innerHTML = `<div class="empty">Записей пока нет</div>`;
      return;
    }

    $("recordsBody").innerHTML = rows.map(r => `
      <tr>
        <td>${escapeHtml(r.date || "")}</td>
        <td>${escapeHtml(r.client || "")}</td>
        <td>${escapeHtml(r.car || "")}</td>
        <td>${escapeHtml((r.elements || []).join(", "))}</td>
        <td><b>${money(r.price)}</b></td>
        <td>${escapeHtml(r.paymentMethod || "")}</td>
        <td><span class="badge ${r.status === "оплачено" ? "paid" : "unpaid"}">${escapeHtml(r.status || "")}</span></td>
        <td><button class="btn small danger" data-del-record="${r.id}">Удалить</button></td>
      </tr>
    `).join("");

    $("recordsCards").innerHTML = rows.map(r => `
      <div class="recordCard">
        <div class="recordTop">
          <div>
            <div class="recordTitle">${escapeHtml(r.client || "")}</div>
            <div class="recordMeta">${escapeHtml(r.date || "")}${r.car ? " · " + escapeHtml(r.car) : ""}</div>
          </div>
          <div class="recordPrice">${money(r.price)}</div>
        </div>
        <span class="badge ${r.status === "оплачено" ? "paid" : "unpaid"}">${escapeHtml(r.status || "")}</span>
        <span class="badge" style="background:rgba(255,255,255,.06);color:var(--muted);margin-left:5px">${escapeHtml(r.paymentMethod || "")}</span>
        <div class="recordLine"><b>Элементы:</b> ${escapeHtml((r.elements || []).join(", "))}</div>
        <div style="margin-top:10px">
          <button class="btn small danger" data-del-record="${r.id}">Удалить</button>
        </div>
      </div>
    `).join("");
  }

  function renderAll(){
    renderClients();
    renderSelectedElements();
    renderExtraElements();
    renderPayment();
    renderStats();
    renderTable();
    save();
  }

  $("date").value = todayISO();

  document.querySelectorAll(".tab").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      ["add","stats","table","settings"].forEach(s => $("screen-" + s).classList.add("hidden"));
      $("screen-" + btn.dataset.screen).classList.remove("hidden");
      renderAll();
    });
  });

  document.querySelector(".car").addEventListener("click", e => {
    const part = e.target.closest(".part");
    if(!part) return;

    const name = part.dataset.part;
    if(selectedElements.includes(name)){
      selectedElements = selectedElements.filter(x => x !== name);
    }else{
      selectedElements.push(name);
    }
    renderSelectedElements();
  });

  $("selectedElementsBox").addEventListener("click", e => {
    const btn = e.target.closest("[data-remove-selected]");
    if(!btn) return;
    const name = btn.dataset.removeSelected;
    selectedElements = selectedElements.filter(x => x !== name);
    renderSelectedElements();
  });

  $("paymentButtons").addEventListener("click", e => {
    const btn = e.target.closest("[data-payment]");
    if(!btn) return;
    selectedPayment = btn.dataset.payment;
    renderPayment();
  });

  $("statusChips").addEventListener("click", e => {
    const btn = e.target.closest("[data-status]");
    if(!btn) return;
    selectedStatus = btn.dataset.status;
    document.querySelectorAll(".statusBtn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  });

  $("incomeForm").addEventListener("submit", e => {
    e.preventDefault();

    if(!selectedElements.length){
      showToast("Выбери хотя бы один элемент");
      return;
    }

    const record = {
      id: Date.now(),
      date: $("date").value || todayISO(),
      client: $("client").value,
      car: $("car").value.trim(),
      elements: selectedElements,
      price: Number($("price").value || 0),
      paymentMethod: selectedPayment,
      status: selectedStatus
    };

    state.records.push(record);
    save();

    $("car").value = "";
    $("price").value = "";
    selectedElements = [];
    selectedStatus = "оплачено";
    selectedPayment = "наличные";
    document.querySelectorAll(".statusBtn").forEach(b => b.classList.toggle("active", b.dataset.status === selectedStatus));

    renderAll();
    showToast("Доход сохранен");
  });

  $("addClientBtn").addEventListener("click", () => {
    const val = $("newClient").value.trim();
    if(!val) return;
    if(!state.clients.includes(val)) state.clients.push(val);
    $("newClient").value = "";
    renderAll();
    showToast("Организация добавлена");
  });

  $("client").addEventListener("change", renderQuickClients);

  $("quickClients").addEventListener("click", e => {
    const btn = e.target.closest("[data-quick-client]");
    if(!btn) return;
    $("client").value = btn.dataset.quickClient;
    renderQuickClients();

    const currentFilter = $("clientFilter") ? $("clientFilter").value : "";
    if($("clientFilter")){
      $("clientFilter").innerHTML = `<option value="">Все организации</option>` + state.clients.map(c => `
        <option value="${escapeHtml(c)}" ${c === currentFilter ? "selected" : ""}>${escapeHtml(c)}</option>
      `).join("");
    }
  });

  $("addElementBtn").addEventListener("click", () => {
    const val = $("newElement").value.trim();
    if(!val) return;
    if(!state.extraElements.includes(val)) state.extraElements.push(val);
    $("newElement").value = "";
    renderAll();
    showToast("Элемент добавлен");
  });

  document.body.addEventListener("click", e => {
    const dc = e.target.closest("[data-del-client]");
    if(dc){
      const i = Number(dc.dataset.delClient);
      if(state.clients.length <= 1){
        showToast("Нужен хотя бы один клиент");
        return;
      }
      state.clients.splice(i,1);
      renderAll();
      return;
    }

    const de = e.target.closest("[data-del-element]");
    if(de){
      const i = Number(de.dataset.delElement);
      state.extraElements.splice(i,1);
      selectedElements = selectedElements.filter(x => bodyParts.includes(x) || state.extraElements.includes(x));
      renderAll();
      return;
    }

    const ae = e.target.closest("[data-add-extra]");
    if(ae){
      const name = ae.dataset.addExtra;
      if(!selectedElements.includes(name)) selectedElements.push(name);
      document.querySelector('[data-screen="add"]').click();
      renderAll();
      return;
    }

    const dr = e.target.closest("[data-del-record]");
    if(dr){
      const id = Number(dr.dataset.delRecord);
      state.records = state.records.filter(r => r.id !== id);
      renderAll();
      showToast("Запись удалена");
    }
  });

  $("searchInput").addEventListener("input", renderTable);
  $("statusFilter").addEventListener("change", renderTable);
  $("clientFilter").addEventListener("change", renderTable);

  function ruDate(dateString){
    if(!dateString) return "";
    const [y,m,d] = dateString.split("-");
    return `${d}.${m}.${y}`;
  }

  function reportPeriod(rows){
    const dates = rows.map(r => r.date).filter(Boolean).sort();
    if(!dates.length) return {from:"", to:"", title:"Детализация по работам"};
    return {
      from: dates[0],
      to: dates[dates.length - 1],
      title: `Детализация по работам с ${ruDate(dates[0])} по ${ruDate(dates[dates.length - 1])}`
    };
  }

  function makePdfReport(){
    const rows = getFilteredRows();
    if(!rows.length){
      showToast("Нет заказов для отчета");
      return;
    }

    const period = reportPeriod(rows);
    const total = rows.reduce((s,r) => s + Number(r.price || 0), 0);
    const client = $("clientFilter").value || "Все организации";
    const status = $("statusFilter").value || "Все статусы";

    const tableRows = rows
      .slice()
      .sort((a,b) => (a.date || "").localeCompare(b.date || "") || a.id - b.id)
      .map(r => `
        <tr>
          <td>${escapeHtml(ruDate(r.date))}</td>
          <td>${escapeHtml(r.client || "")}</td>
          <td>${escapeHtml(r.car || "")}</td>
          <td>${escapeHtml((r.elements || []).join(", "))}</td>
          <td class="money">${money(r.price)}</td>
        </tr>
      `).join("");

    const doc = window.open("", "_blank");
    if(!doc){
      showToast("Браузер заблокировал окно");
      return;
    }

    doc.document.write(`<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<title>Доходы PDR S23 Plus</title>
<style>
  @page { size: A4; margin: 14mm; }
  *{box-sizing:border-box}
  body{font-family:Arial, sans-serif;color:#111;margin:0;font-size:12px}
  h1{font-size:18px;margin:0 0 6px}
  .meta{font-size:11px;color:#555;margin-bottom:14px;line-height:1.35}
  table{width:100%;border-collapse:collapse}
  th,td{border:1px solid #bbb;padding:6px;vertical-align:top}
  th{background:#f0f0f0;text-align:left}
  .money{text-align:right;white-space:nowrap}
  .total{margin-top:12px;text-align:right;font-size:15px;font-weight:bold}
  .footer{margin-top:18px;color:#777;font-size:10px}

  </style>
</head>
<body>
  <h1>${escapeHtml(period.title)}</h1>
  <div class="meta">
    Организация: ${escapeHtml(client)}<br>
    Статус: ${escapeHtml(status)}
  </div>
  <table>
    <thead>
      <tr>
        <th>Дата</th>
        <th>Клиент</th>
        <th>Автомобиль</th>
        <th>Элемент</th>
        <th>Стоимость</th>
      </tr>
    </thead>
    <tbody>${tableRows}</tbody>
  </table>
  <div class="total">Итого: ${money(total)}</div>
  <div class="footer">Сформировано из локального учета доходов PDR</div>
<script>
  window.onload = () => {
    setTimeout(() => window.print(), 250);
  };
<\/script>
</body>
</html>`);
    doc.document.close();
  }

  function markFilteredUnpaidAsPaid(){
    const rows = getFilteredRows().filter(r => r.status === "не оплачено");
    if(!rows.length){
      showToast("Нет неоплаченных заказов");
      return;
    }

    const sum = rows.reduce((s,r) => s + Number(r.price || 0), 0);
    const ok = confirm(`Отметить как оплаченные ${rows.length} заказ(ов) на сумму ${money(sum)}?`);
    if(!ok) return;

    const ids = new Set(rows.map(r => r.id));
    state.records = state.records.map(r => ids.has(r.id) ? {...r, status:"оплачено"} : r);
    renderAll();
    showToast("Статус изменен на оплачено");
  }

  $("makePdfBtn").addEventListener("click", makePdfReport);
  $("markFilteredPaidBtn").addEventListener("click", markFilteredUnpaidAsPaid);

  $("clearAllBtn").addEventListener("click", () => {
    if(confirm("Точно удалить все записи? Списки клиентов и элементов останутся.")){
      state.records = [];
      renderAll();
      showToast("Записи очищены");
    }
  });

  renderAll();
})();
</script>

<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
</script>
</body>
</html>
